name: release
on:
  push:
    tags:
      - v*
jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
    runs-on: ${{ matrix.goos }}-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: Install SQLite (Windows)
        if: matrix.goos == 'windows'
        run: |
          curl -L -o sqlite.zip "https://sqlite.org/2025/sqlite-dll-win-x64-3470000.zip"
          unzip -o sqlite.zip -d sqlite
          ls sqlite/
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 1
          CGO_CFLAGS: "-I${{ github.workspace }}/sqlite"
          CGO_LDFLAGS: "-L${{ github.workspace }}/sqlite -lsqlite3"
        run: |
          go build -ldflags="-s -w -X main.version=${{ github.ref_name }}" -o dist/picobrain-mcp-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/picobrain-mcp
          if [ "${{ matrix.goos }}" = "windows" ]; then
            cp sqlite/sqlite3.dll dist/
          fi
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: picobrain-mcp-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*
          retention-days: 5

  create-release:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Create checksums
        run: |
          cd dist
          sha256sum picobrain-mcp-* > checksums.txt
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*
          checksum_files: dist/checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}