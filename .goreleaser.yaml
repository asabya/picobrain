project_name: picobrain

release:
  prerelease: auto
  github:
    owner: asabya
    name: picobrain
  draft: false
env:
  - GO111MODULE=on
  - CGO_ENABLED=1
  - CGO_CFLAGS=-I/go/src/github.com/asabya/picobrain/cdeps/sqlite3

builds:
  - id: linux-amd64
    main: ./cmd/picobrain-mcp
    binary: picobrain-mcp
    goos:
      - linux
    goarch:
      - amd64
    env:
      - CC=x86_64-linux-gnu-gcc
      - CXX=x86_64-linux-gnu-g++
    flags:
      - -v
      - -trimpath
    ldflags:
      - -s -w -X main.version={{.Version}}

  - id: linux-arm64
    main: ./cmd/picobrain-mcp
    binary: picobrain-mcp
    goos:
      - linux
    goarch:
      - arm64
    env:
      - CC=aarch64-linux-gnu-gcc
      - CXX=aarch64-linux-gnu-g++
    flags:
      - -v
      - -trimpath
    ldflags:
      - -s -w -X main.version={{.Version}}
  
  - id: darwin-amd64
    main: ./cmd/picobrain-mcp
    binary: picobrain-mcp
    goos:
      - darwin
    goarch:
      - amd64
    env:
      - CC=o64-clang
      - CXX=o64-clang++
    flags:
      - -v
      - -trimpath
    ldflags:
      - -s -w -X main.version={{.Version}}
      
  - id: darwin-arm64
    main: ./cmd/picobrain-mcp
    binary: picobrain-mcp
    goos:
      - darwin
    goarch:
      - arm64
    env:
      - CC=oa64-clang
      - CXX=oa64-clang++
    flags:
      - -v
      - -trimpath
    ldflags:
      - -s -w -X main.version={{.Version}}

  - id: windows-amd64
    main: ./cmd/picobrain-mcp
    binary: picobrain-mcp
    goos:
      - windows
    goarch:
      - amd64
    env:
      - CC=x86_64-w64-mingw32-gcc
      - CXX=x86_64-w64-mingw32-g++
    flags:
      - -v
      - -trimpath
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - id: picobrain
    builds:
      - linux-amd64
      - linux-arm64
      - darwin-amd64
      - darwin-arm64
      - windows-amd64
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format: binary
    wrap_in_directory: true

dockers:
  - image_templates:
      - "asabya/picobrain:v{{ .Version }}-amd64"
    use: buildx
    ids:
      - linux-amd64
    goarch: amd64
    dockerfile: Dockerfile.goreleaser
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--pull"
      - "--label=org.opencontainers.image.created={{.Date}}"
      - "--label=org.opencontainers.image.title={{.ProjectName}}"
      - "--label=org.opencontainers.image.revision={{.FullCommit}}"
      - "--label=org.opencontainers.image.version={{.Version}}"
  - image_templates:
      - "asabya/picobrain:v{{ .Version }}-arm64"
    use: buildx
    ids:
      - linux-arm64
    goarch: arm64
    dockerfile: Dockerfile.goreleaser
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--pull"
      - "--label=org.opencontainers.image.created={{.Date}}"
      - "--label=org.opencontainers.image.title={{.ProjectName}}"
      - "--label=org.opencontainers.image.revision={{.FullCommit}}"
      - "--label=org.opencontainers.image.version={{.Version}}"

docker_manifests:
  - name_template: "asabya/picobrain:v{{ .Major }}.{{ .Minor }}.{{ .Patch }}{{ with .Prerelease }}-{{ . }}{{ end }}"
    image_templates:
      - asabya/picobrain:v{{ .Version }}-amd64
      - asabya/picobrain:v{{ .Version }}-arm64
  - name_template: "asabya/picobrain:latest"
    image_templates:
      - asabya/picobrain:v{{ .Version }}-amd64
      - asabya/picobrain:v{{ .Version }}-arm64

checksum:
  name_template: 'checksums.txt'

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'