project_name: picobrain

release:
  prerelease: auto
env:
  - GO111MODULE=on
  - CGO_ENABLED=1

builds:
  -id: linux-amd64
    main: ./cmd/picobrain-mcp
    binary: picobrain-mcp
    goos:
      - linux
    goarch:
      - amd64
    env:
      - CC=x86_64-linux-gnu-gcc
      - CXX=x86_64-linux-gnu-g++
    flags:
      - -v
      - -trimpath
    ldflags:
      - -s -w -X main.version={{.Version}}

  -id: linux-arm64
    main: ./cmd/picobrain-mcp
    binary: picobrain-mcp
    goos:
      - linux
    goarch:
      - arm64
    env:
      - CC=aarch64-linux-gnu-gcc
      - CXX=aarch64-linux-gnu-g++
    flags:
      - -v
      - -trimpath
    ldflags:
      - -s -w -X main.version={{.Version}}
  
  -id: darwin-amd64
    main: ./cmd/picobrain-mcp
    binary: picobrain-mcp
    goos:
      - darwin
    goarch:
      - amd64
    env:
      - CC=o64-clang
      - CXX=o64-clang++
    flags:
      - -v
      - -trimpath
    ldflags:
      - -s -w -X main.version={{.Version}}
      
  -id: darwin-arm64
    main: ./cmd/picobrain-mcp
    binary: picobrain-mcp
    goos:
      - darwin
    goarch:
      - arm64
    env:
      - CC=oa64-clang
      - CXX=oa64-clang++
    flags:
      - -v
      - -trimpath
    ldflags:
      - -s -w -X main.version={{.Version}}

  -id: windows-amd64
    main: ./cmd/picobrain-mcp
    binary: picobrain-mcp
    goos:
      - windows
    goarch:
      - amd64
    env:
      - CC=x86_64-w64-mingw32-gcc
      - CXX=x86_64-w64-mingw32-g++
    flags:
      - -v
      - -trimpath
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - id: picobrain
    builds:
      - picobrain-mcp
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format: zip
    wrap_in_directory: true

checksum:
  name_template: 'checksums.txt'

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'

release:
  github:
    owner: asabya
    name: picobrain
  prerelease: auto
  draft: false